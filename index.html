<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>請假通知</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --primary: #1565c0;
      --primary-dark: #0d47a1;
      --bg: #f4f8fc;
      --card: #ffffff;
      --text: #263238;
      --muted: #607d8b;
      --border: #d9e2ec;
      --danger: #c62828;
      --success: #2e7d32;
      --warning-bg: #fff8e1;
      --warning-border: #ffe082;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Microsoft JhengHei",
        sans-serif;
    }

    .container {
      width: min(100%, 640px);
      margin: 0 auto;
      padding: 20px 16px 36px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 8px 24px rgba(28, 73, 118, 0.1);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    .notice {
      margin-bottom: 22px;
      padding: 13px 14px;
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 12px;
      color: #6d5600;
      font-size: 14px;
      line-height: 1.65;
    }

    .status {
      min-height: 22px;
      margin-bottom: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
      font-weight: 700;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      font-weight: 700;
    }

    .required {
      margin-left: 4px;
      color: var(--danger);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.55;
    }

    .leave-type-list {
      display: grid;
      gap: 10px;
    }

    .leave-type-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .leave-type-option:has(input:checked) {
      border-color: var(--primary);
      background: #eef6ff;
    }

    .leave-type-option input {
      width: auto;
      margin: 0;
    }

    .conditional-area {
      display: none;
      margin-top: 12px;
      padding: 14px;
      border: 1px solid #dbe8f4;
      border-radius: 12px;
      background: #f8fbff;
    }

    .conditional-area.show {
      display: block;
    }

    .period-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .period-row span {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .checkbox-row {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      margin: 4px 0 18px;
      color: #455a64;
      font-size: 14px;
      line-height: 1.6;
    }

    .checkbox-row input {
      width: auto;
      margin-top: 3px;
    }

    .button {
      width: 100%;
      margin-top: 4px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: 700;
    }

    .button:hover {
      background: var(--primary-dark);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .success-box {
      display: none;
      padding: 16px;
      border: 1px solid #b7dfba;
      border-radius: 12px;
      background: #f1f8f1;
      color: #1f6b29;
      line-height: 1.7;
      white-space: pre-line;
    }

    .success-box.show {
      display: block;
    }

    .form-area.hidden {
      display: none;
    }

    .close-button {
      display: none;
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--primary);
      border-radius: 10px;
      background: #fff;
      color: var(--primary);
      font-size: 16px;
      font-weight: 700;
    }

    .close-button.show {
      display: block;
    }

    .help-text {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 420px) {
      .card {
        padding: 22px 16px;
      }

      .period-row {
        grid-template-columns: 1fr;
      }

      .period-row span {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <h1>請假通知</h1>

      <p class="subtitle">
        請填寫資料後送出，系統將把通知傳送至老師的官方帳號聊天室。
      </p>

      <div class="notice">
        本表單僅用於提前通知老師，並不等同完成正式請假。<br>
        送出後，請務必再至學校校務系統完成後續請假手續。
      </div>

      <div id="status" class="status">
        正在初始化 LINE……
      </div>

      <div id="formArea" class="form-area">
        <form id="leaveForm">
          <div class="field">
            <label for="leaveDate">
              請假日期<span class="required">*</span>
            </label>

            <input id="leaveDate" type="date" required>
          </div>

          <div class="field">
            <label>
              請假方式<span class="required">*</span>
            </label>

            <div class="leave-type-list">
              <label class="leave-type-option">
                <input
                  type="radio"
                  name="leaveType"
                  value="全天"
                  checked
                >
                全天
              </label>

              <label class="leave-type-option">
                <input
                  type="radio"
                  name="leaveType"
                  value="半天"
                >
                半天
              </label>

              <label class="leave-type-option">
                <input
                  type="radio"
                  name="leaveType"
                  value="節次"
                >
                指定節次
              </label>
            </div>

            <div id="halfDayArea" class="conditional-area">
              <label for="halfDayPeriod">
                請選擇時段<span class="required">*</span>
              </label>

              <select id="halfDayPeriod">
                <option value="">請選擇上午或下午</option>
                <option value="上午">上午</option>
                <option value="下午">下午</option>
              </select>
            </div>

            <div id="classPeriodArea" class="conditional-area">
              <label>
                請假節次<span class="required">*</span>
              </label>

              <div class="period-row">
                <select id="startPeriod">
                  <option value="">起始節次</option>
                  <option value="1">第 1 節</option>
                  <option value="2">第 2 節</option>
                  <option value="3">第 3 節</option>
                  <option value="4">第 4 節</option>
                  <option value="5">第 5 節</option>
                  <option value="6">第 6 節</option>
                  <option value="7">第 7 節</option>
                </select>

                <span>至</span>

                <select id="endPeriod">
                  <option value="">結束節次</option>
                  <option value="1">第 1 節</option>
                  <option value="2">第 2 節</option>
                  <option value="3">第 3 節</option>
                  <option value="4">第 4 節</option>
                  <option value="5">第 5 節</option>
                  <option value="6">第 6 節</option>
                  <option value="7">第 7 節</option>
                </select>
              </div>

              <p class="help-text">
                例如選擇第 2 節至第 4 節，通知內容會顯示為「第 2 節至第 4 節」。
              </p>
            </div>
          </div>

          <div class="field">
            <label for="studentName">
              請假學生姓名<span class="required">*</span>
            </label>

            <input
              id="studentName"
              type="text"
              maxlength="30"
              placeholder="請輸入學生姓名"
              required
            >
          </div>

          <div class="field">
            <label for="relationship">
              填寫者身分<span class="required">*</span>
            </label>

            <select id="relationship" required>
              <option value="">請選擇身分</option>
              <option value="學生">學生</option>
              <option value="家長">家長</option>
            </select>
          </div>

          <div class="field">
            <label for="reason">
              請假事由<span class="required">*</span>
            </label>

            <textarea
              id="reason"
              maxlength="200"
              placeholder="例如：身體不適，需就醫。"
              required
            ></textarea>
          </div>

          <label class="checkbox-row">
            <input id="confirmCheck" type="checkbox" required>
            <span>
              我了解本通知不等同正式請假，仍須至校務系統完成請假手續。
            </span>
          </label>

          <button id="submitButton" class="button" type="submit" disabled>
            送出請假通知
          </button>
        </form>
      </div>

      <div id="successBox" class="success-box"></div>

      <button id="closeButton" class="close-button" type="button">
        返回 LINE 聊天室
      </button>
    </section>
  </main>

  <script>
    // 請替換成自己在 LINE Developers 建立 LIFF App 後取得的 LIFF ID。
    const LIFF_ID = '請填入你的LIFF_ID';

    const state = {
      initialized: false,
      isInClient: false
    };

    const element = {
      status: document.getElementById('status'),
      formArea: document.getElementById('formArea'),
      leaveForm: document.getElementById('leaveForm'),
      leaveDate: document.getElementById('leaveDate'),
      halfDayArea: document.getElementById('halfDayArea'),
      classPeriodArea: document.getElementById('classPeriodArea'),
      halfDayPeriod: document.getElementById('halfDayPeriod'),
      startPeriod: document.getElementById('startPeriod'),
      endPeriod: document.getElementById('endPeriod'),
      studentName: document.getElementById('studentName'),
      relationship: document.getElementById('relationship'),
      reason: document.getElementById('reason'),
      submitButton: document.getElementById('submitButton'),
      successBox: document.getElementById('successBox'),
      closeButton: document.getElementById('closeButton')
    };

    document.addEventListener('DOMContentLoaded', initializeLiff);

    element.leaveForm.addEventListener('submit', submitLeaveNotice);
    element.closeButton.addEventListener('click', closeLiffWindow);

    document.querySelectorAll('input[name="leaveType"]').forEach(function(radio) {
      radio.addEventListener('change', updateLeaveTypeFields);
    });

    async function initializeLiff() {
      element.leaveDate.value = getTodayInTaipei();
      updateLeaveTypeFields();

      try {
        setStatus('正在初始化 LINE……');

        await liff.init({
          liffId: LIFF_ID
        });

        state.isInClient = liff.isInClient();

        if (!liff.isLoggedIn()) {
          setStatus('正在導向 LINE 登入……');

          liff.login({
            redirectUri: window.location.href
          });

          return;
        }

        if (!state.isInClient) {
          throw new Error(
            '請從官方帳號聊天室或圖文選單開啟本頁，才能將請假通知傳送到聊天室。'
          );
        }

        state.initialized = true;
        element.submitButton.disabled = false;

        setStatus('已完成 LINE 身分驗證，可填寫請假通知。', 'success');

      } catch (error) {
        console.error(error);

        const message = error && error.message
          ? error.message
          : String(error);

        setStatus(`LINE 初始化失敗：${message}`, 'error');
      }
    }

    function updateLeaveTypeFields() {
      const leaveType = getSelectedLeaveType();

      element.halfDayArea.classList.toggle(
        'show',
        leaveType === '半天'
      );

      element.classPeriodArea.classList.toggle(
        'show',
        leaveType === '節次'
      );

      if (leaveType !== '半天') {
        element.halfDayPeriod.value = '';
      }

      if (leaveType !== '節次') {
        element.startPeriod.value = '';
        element.endPeriod.value = '';
      }
    }

    async function submitLeaveNotice(event) {
      event.preventDefault();

      if (!state.initialized) {
        setStatus(
          '尚未完成 LINE 連線，請從官方帳號聊天室重新開啟本頁。',
          'error'
        );
        return;
      }

      const leaveDate = element.leaveDate.value.trim();
      const leavePeriod = getLeavePeriodText();
      const studentName = element.studentName.value.trim();
      const relationship = element.relationship.value.trim();
      const reason = normalizeText(element.reason.value);

      if (!leaveDate || !leavePeriod || !studentName || !relationship || !reason) {
        setStatus('請完整填寫所有必填欄位。', 'error');
        return;
      }

      const message = [
        '【請假通知】',
        `請假日期：${leaveDate}`,
        `請假時段：${leavePeriod}`,
        `學生姓名：${studentName}`,
        `填寫者身分：${relationship}`,
        `請假事由：${reason}`,
        '',
        '請務必至校務系統完成正式請假手續。'
      ].join('\n');

      try {
        setSubmitting(true);
        setStatus('正在傳送請假通知……');

        await liff.sendMessages([
          {
            type: 'text',
            text: message
          }
        ]);

        element.formArea.classList.add('hidden');

        element.successBox.textContent = [
          '請假通知已傳送至老師的官方帳號聊天室。',
          '',
          '請務必再至校務系統完成正式請假手續。'
        ].join('\n');

        element.successBox.classList.add('show');
        element.closeButton.classList.add('show');

        setStatus('通知已送出。', 'success');

      } catch (error) {
        console.error(error);

        const messageText = error && error.message
          ? error.message
          : String(error);

        setStatus(
          `通知傳送失敗：${messageText}`,
          'error'
        );

        setSubmitting(false);
      }
    }

    function getSelectedLeaveType() {
      const selected = document.querySelector(
        'input[name="leaveType"]:checked'
      );

      return selected ? selected.value : '';
    }

    function getLeavePeriodText() {
      const leaveType = getSelectedLeaveType();

      if (leaveType === '全天') {
        return '全天';
      }

      if (leaveType === '半天') {
        const halfDayPeriod = element.halfDayPeriod.value.trim();

        return halfDayPeriod
          ? `${halfDayPeriod}（半天）`
          : '';
      }

      if (leaveType === '節次') {
        const startPeriod = Number(element.startPeriod.value);
        const endPeriod = Number(element.endPeriod.value);

        if (!startPeriod || !endPeriod) {
          setStatus('請選擇請假的起始節次與結束節次。', 'error');
          return '';
        }

        if (startPeriod > endPeriod) {
          setStatus('起始節次不可晚於結束節次。', 'error');
          return '';
        }

        if (startPeriod === endPeriod) {
          return `第 ${startPeriod} 節`;
        }

        return `第 ${startPeriod} 節至第 ${endPeriod} 節`;
      }

      return '';
    }

    function setSubmitting(isSubmitting) {
      element.submitButton.disabled = isSubmitting;
      element.submitButton.textContent = isSubmitting
        ? '傳送中……'
        : '送出請假通知';
    }

    function setStatus(message, type = '') {
      element.status.textContent = message;
      element.status.className = `status ${type}`;
    }

    function closeLiffWindow() {
      if (liff.isInClient()) {
        liff.closeWindow();
        return;
      }

      window.close();
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/[\r\n\t]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getTodayInTaipei() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });

      return formatter.format(new Date());
    }
  </script>
</body>
</html>
